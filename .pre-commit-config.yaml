default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - '--baseline'
          - '.secrets.baseline'
          - '--exclude-files'
          - 'pnpm-lock\.yaml|package-lock\.json|\.secrets\.baseline|tsconfig\.tsbuildinfo|\.next/'
        exclude: pnpm-lock\.yaml|package-lock\.json|\.secrets\.baseline|tsconfig\.tsbuildinfo|\.next/

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        args: ['--config', '.gitleaks.toml']

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: check-yaml
        args: ['--allow-multiple-documents']
      - id: check-json
      - id: detect-private-key
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: eslint-frontend
        name: ESLint (frontend TypeScript)
        language: system
        entry: bash -c 'cd frontend && pnpm exec eslint app components hooks lib context --max-warnings 0'
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
