name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_BASE: ghcr.io/tues-2026-pbl-11-klas/proektadjiite-urbanpulse

jobs:
  # ── CI: Backend ──────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests with coverage
        working-directory: backend
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 14

  # ── CI: Frontend ─────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ""
        run: pnpm build

  # ── CD: Docker Build & Push (main only) ──────────────────────────
  docker-push:
    name: Push Docker Images
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: tag
        run: echo "sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/backend:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE_BASE }}/backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: NEXT_PUBLIC_API_URL=
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE_BASE }}/frontend:latest

  # ── CD: Deploy to kind (main only) ───────────────────────────────
  deploy:
    name: Deploy to kind
    needs: docker-push
    runs-on: ubuntu-latest
    permissions:
      packages: read
    env:
      CLUSTER: urbanpulse
      TAG: ${{ needs.docker-push.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: urbanpulse
          config: k8s/kind-config.yaml

      - name: Label control-plane node for ingress
        run: kubectl label node urbanpulse-control-plane ingress-ready=true

      - name: Install NGINX ingress controller
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/kind/deploy.yaml
          kubectl rollout status deployment/ingress-nginx-controller \
            -n ingress-nginx --timeout=120s

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and load images into kind
        run: |
          docker pull ${{ env.IMAGE_BASE }}/backend:${{ env.TAG }}
          docker pull ${{ env.IMAGE_BASE }}/frontend:${{ env.TAG }}
          kind load docker-image \
            ${{ env.IMAGE_BASE }}/backend:${{ env.TAG }} \
            ${{ env.IMAGE_BASE }}/frontend:${{ env.TAG }} \
            --name ${{ env.CLUSTER }}

      - name: Apply namespace and config
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml

      - name: Create secrets
        run: |
          kubectl create secret generic urbanpulse-secrets \
            --namespace=urbanpulse \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD || 'urbanpulse' }}" \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET || 'ci-jwt-secret-dev' }}" \
            --from-literal=SMTP_USER="${{ secrets.SMTP_USER || '' }}" \
            --from-literal=SMTP_PASS="${{ secrets.SMTP_PASS || '' }}"

      - name: Deploy database and wait for ready
        run: |
          sed "s/IMAGE_TAG/${{ env.TAG }}/g" k8s/database.yaml | kubectl apply -f -
          kubectl rollout status statefulset/postgres \
            -n urbanpulse --timeout=180s

      - name: Deploy app
        run: |
          for f in k8s/backend.yaml k8s/frontend.yaml k8s/ingress.yaml; do
            sed "s/IMAGE_TAG/${{ env.TAG }}/g" "$f" | kubectl apply -f -
          done
          kubectl wait pod \
            -l 'app.kubernetes.io/name in (backend,frontend)' \
            -n urbanpulse --for=condition=Ready --timeout=180s

      - name: Smoke test /api/stats
        run: |
          for i in $(seq 1 24); do
            status=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/api/stats)
            if [ "$status" = "200" ]; then
              echo "Smoke test passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $status — retrying in 5s..."
            sleep 5
          done
          echo "ERROR: /api/stats did not return 200 after 2 minutes"
          kubectl logs -l app.kubernetes.io/name=backend -n urbanpulse --tail=50
          exit 1
