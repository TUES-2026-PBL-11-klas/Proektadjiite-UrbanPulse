name: CD

on:
  push:
    branches: [main]

env:
  BACKEND_IMAGE: ghcr.io/tues-2026-pbl-11-klas/proektadjiite-urbanpulse/backend
  FRONTEND_IMAGE: ghcr.io/tues-2026-pbl-11-klas/proektadjiite-urbanpulse/frontend

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8080/api

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x ./kind && sudo mv ./kind /usr/local/bin/kind

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Create kind cluster
        run: kind create cluster --name urbanpulse --config k8s/kind-config.yaml

      - name: Install NGINX Ingress
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/kind/deploy.yaml
          kubectl rollout status deployment/ingress-nginx-controller -n ingress-nginx --timeout=90s

      - name: Log in to GHCR (for image pull)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images and load into kind
        run: |
          docker pull ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker pull ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          kind load docker-image \
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --name urbanpulse

      - name: Apply namespace and config
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml

      - name: Create secrets
        run: |
          kubectl create secret generic urbanpulse-secrets \
            --namespace=urbanpulse \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=DATABASE_URL="postgresql://urbanpulse:${{ secrets.DB_PASSWORD }}@postgres-service:5432/urbanpulse" \
            --from-literal=SMTP_USER="" \
            --from-literal=SMTP_PASS=""

      - name: Deploy manifests
        run: |
          for f in k8s/database.yaml k8s/backend.yaml k8s/frontend.yaml k8s/ingress.yaml; do
            sed "s|IMAGE_TAG|${{ github.sha }}|g" "$f" | kubectl apply -f -
          done

      - name: Wait for pods ready
        run: |
          kubectl wait pod \
            -l 'app.kubernetes.io/name in (backend,frontend)' \
            -n urbanpulse --for=condition=Ready --timeout=180s

      - name: Smoke test
        run: |
          sleep 10
          curl -sf --retry 5 --retry-delay 5 http://localhost:8080/

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          RESULT="${{ needs.deploy.result }}"
          if [ "$RESULT" = "success" ]; then
            STATUS="deployed"
            COLOR=3066993
          else
            STATUS="failed"
            COLOR=15158332
          fi
          curl -fsSL -X POST "$DISCORD_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"embeds\":[{\"title\":\"CD $STATUS\",\"color\":$COLOR,\"fields\":[{\"name\":\"Commit\",\"value\":\"$(echo '${{ github.sha }}' | cut -c1-7)\",\"inline\":true},{\"name\":\"Branch\",\"value\":\"main\",\"inline\":true}]}]}"
