# ──────────────────────────────────────────────
# ExternalName Service: cross-namespace proxy for Grafana
# Added by Terraform (Stage 5) once kube-prometheus-stack is deployed.
# Kept here as a placeholder — applied only after the monitoring namespace exists.
# ──────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: grafana-external
  namespace: urbanpulse
  labels:
    app.kubernetes.io/part-of: urbanpulse
    app.kubernetes.io/component: ingress
spec:
  type: ExternalName
  # Terraform will deploy kube-prometheus-stack into the monitoring namespace (Stage 5).
  # Until then this service resolves to nothing — the /grafana ingress path returns 503.
  externalName: kube-prometheus-stack-grafana.monitoring.svc.cluster.local
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
---
# ──────────────────────────────────────────────
# NGINX Ingress
# Routes:
#   /api      → backend-service:3000  (backend serves routes under /api already — no rewrite)
#   /uploads  → backend-service:3000  (express.static at /uploads)
#   /grafana  → grafana-external:80   (kube-prometheus-stack Grafana, active after Stage 5)
#   /         → frontend-service:3001 (catch-all, must be last)
# ──────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: urbanpulse-ingress
  namespace: urbanpulse
  labels:
    app.kubernetes.io/part-of: urbanpulse
    app.kubernetes.io/component: ingress
  annotations:
    # Allow up to 10 MB request bodies for image uploads (multer)
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Suppress upstream DNS errors for grafana-external until monitoring namespace exists
    nginx.ingress.kubernetes.io/upstream-vhost: "urbanpulse.local"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3000
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3000
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana-external
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3001
